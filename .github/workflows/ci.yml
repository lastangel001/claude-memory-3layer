name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # windows-latest = Git Bash, the primary target platform
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Syntax-check all shell scripts
        run: |
          rc=0
          for f in install.sh migrate.sh hooks/*.sh bin/*.sh bin/lib/*.sh; do
            bash -n "$f" || { echo "SYNTAX FAIL: $f"; rc=1; }
          done
          exit $rc

      - name: shellcheck
        # ubuntu only: shellcheck is preinstalled on ubuntu-latest; windows job
        # covers Git Bash runtime behavior, static analysis needs one OS.
        if: matrix.os == 'ubuntu-latest'
        run: shellcheck -S warning install.sh migrate.sh hooks/*.sh bin/*.sh bin/lib/*.sh

      - name: Install bats-core
        # git clone instead of npm -g: avoids EACCES on ubuntu and works
        # identically under Git Bash on windows ($HOME is a unix-style path).
        run: git clone --depth 1 https://github.com/bats-core/bats-core.git "$HOME/bats-core"

      - name: Run tests
        run: '"$HOME/bats-core/bin/bats" tests/'
